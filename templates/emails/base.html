<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Tramper{% endblock %}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .email-wrapper {
        max-width: 600px;
        margin: 0 auto;
      }

      .container {
        background-color: #ffffff;
        border-radius: 16px;
        padding: 0;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #4086eb 0%, #5a67d8 100%);
        padding: 40px;
        text-align: center;
      }

      .logo img {
        max-height: 60px;
        width: auto;
      }

      .content {
        padding: 40px;
      }

      h1 {
        color: #1f2937;
        margin-bottom: 20px;
        font-size: 28px;
        font-weight: 700;
      }

      p {
        margin-bottom: 16px;
        color: #4b5563;
        font-size: 16px;
      }

      .greeting {
        font-weight: 600;
        color: #1f2937;
        font-size: 17px;
      }

      .info-box {
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        border-radius: 12px;
        padding: 24px;
        margin: 24px 0;
        border: 2px solid #bae6fd;
      }

      .info-box p {
        margin-bottom: 8px;
        color: #0c4a6e;
      }

      .info-box p:last-child {
        margin-bottom: 0;
      }

      .info-box .label {
        font-weight: 600;
        color: #0c4a6e;
      }

      .status-badge {
        display: inline-block;
        padding: 6px 16px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-approved {
        background-color: #d1fae5;
        color: #065f46;
        border: 1px solid #6ee7b7;
      }

      .status-rejected {
        background-color: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
      }

      .status-active {
        background-color: #d1fae5;
        color: #065f46;
        border: 1px solid #6ee7b7;
      }

      .status-inactive {
        background-color: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
      }

      .notes-box {
        background-color: #f9fafb;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        padding: 20px;
        margin: 20px 0;
        font-size: 15px;
        color: #374151;
        line-height: 1.6;
      }

      .notes-box .notes-title {
        font-weight: 600;
        color: #1f2937;
        margin-bottom: 8px;
        font-size: 15px;
      }

      .cta-section {
        text-align: center;
        margin: 30px 0;
        padding: 20px;
        background-color: #f9fafb;
        border-radius: 12px;
      }

      .cta-button {
        display: inline-block;
        background: linear-gradient(135deg, #4086eb 0%, #5a67d8 100%);
        color: #ffffff !important;
        text-decoration: none;
        padding: 16px 32px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 16px;
        box-shadow: 0 4px 12px rgba(64, 134, 235, 0.4);
      }

      .notice-box {
        border-radius: 8px;
        padding: 16px 20px;
        margin: 25px 0;
      }

      .notice-info {
        background-color: #dbeafe;
        border-left: 4px solid #3b82f6;
      }

      .notice-info p {
        color: #1e40af;
      }

      .notice-warning {
        background-color: #fef3c7;
        border-left: 4px solid #f59e0b;
      }

      .notice-warning p {
        color: #92400e;
      }

      .notice-success {
        background-color: #d1fae5;
        border-left: 4px solid #10b981;
      }

      .notice-success p {
        color: #065f46;
      }

      .notice-error {
        background-color: #fee2e2;
        border-left: 4px solid #ef4444;
      }

      .notice-error p {
        color: #991b1b;
      }

      .signature {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 2px solid #e5e7eb;
      }

      .signature p {
        margin-bottom: 8px;
      }

      .team-name {
        color: #4086eb;
        font-weight: 700;
      }

      .footer {
        background-color: #f9fafb;
        padding: 30px 40px;
        border-top: 2px solid #e5e7eb;
      }

      .footer p {
        font-size: 13px;
        color: #6b7280;
        text-align: center;
        margin-bottom: 0;
        line-height: 1.5;
      }

      .footer a {
        color: #4086eb;
        text-decoration: none;
      }

      @media only screen and (max-width: 600px) {
        body {
          padding: 20px 10px;
        }

        .content {
          padding: 30px 20px;
        }

        .header {
          padding: 30px 20px;
        }

        .logo img {
          max-height: 48px;
        }

        h1 {
          font-size: 24px;
        }

        .info-box {
          padding: 16px;
        }
      }

      {% block extra_styles %}{% endblock %}
    </style>
  </head>
  <body>
    <div class="email-wrapper">
      <div class="container">
        <div class="header">
          <div class="logo"><img src="cid:logo" alt="Tramper" /></div>
        </div>

        <div class="content">
          {% block content %}{% endblock %}

          <div class="signature">
            <p>Best regards,</p>
            <p class="team-name">The Tramper Team</p>
          </div>
        </div>

        <div class="footer">
          <p>
            This email was sent to <strong>{{ user.email }}</strong><br />
            {% block footer_text %}{% endblock %}
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
